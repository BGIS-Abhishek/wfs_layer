name: wfs_layer
description: >-
  A Flutter package to load and display Web Feature Service (WFS) layers on a
  flutter_map map. Supports points, lines, polygons, marker clustering, bbox
  filtering, caching, retries, and full customisation. Works on Android, iOS,
  and Web.
version: 0.2.0
repository: https://github.com/BGIS-Abhishek/wfs_layer
issue_tracker: https://github.com/BGIS-Abhishek/wfs_layer/issues
homepage: https://github.com/BGIS-Abhishek/wfs_layer

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_map: ^8.3.0
  http: ^1.3.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # This package provides only Dart/widget code — no assets or fonts.
